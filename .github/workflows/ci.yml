name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hyperrr
        uses: actions/checkout@v4
        with:
          path: hyperrr

      - name: Checkout mdk
        uses: actions/checkout@v4
        with:
          repository: GoHyperrr/mdk
          path: mdk
      - name: Fetch matching branch for mdk
        run: |
          cd mdk
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          if git fetch origin "$BRANCH_NAME":"$BRANCH_NAME" 2>/dev/null; then
            echo "Checking out matching branch: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            echo "Matching branch $BRANCH_NAME not found in GoHyperrr/mdk, staying on default branch."
          fi
        shell: bash

      - name: Checkout auth
        uses: actions/checkout@v4
        with:
          repository: GoHyperrr/auth
          path: auth
      - name: Fetch matching branch for auth
        run: |
          cd auth
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          if git fetch origin "$BRANCH_NAME":"$BRANCH_NAME" 2>/dev/null; then
            echo "Checking out matching branch: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            echo "Matching branch $BRANCH_NAME not found in GoHyperrr/auth, staying on default branch."
          fi
        shell: bash

      - name: Checkout commerce
        uses: actions/checkout@v4
        with:
          repository: GoHyperrr/commerce
          path: commerce
      - name: Fetch matching branch for commerce
        run: |
          cd commerce
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          if git fetch origin "$BRANCH_NAME":"$BRANCH_NAME" 2>/dev/null; then
            echo "Checking out matching branch: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            echo "Matching branch $BRANCH_NAME not found in GoHyperrr/commerce, staying on default branch."
          fi
        shell: bash

      - name: Checkout file-storage
        uses: actions/checkout@v4
        with:
          repository: GoHyperrr/file-storage
          path: file-storage
      - name: Fetch matching branch for file-storage
        run: |
          cd file-storage
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          if git fetch origin "$BRANCH_NAME":"$BRANCH_NAME" 2>/dev/null; then
            echo "Checking out matching branch: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            echo "Matching branch $BRANCH_NAME not found in GoHyperrr/file-storage, staying on default branch."
          fi
        shell: bash

      - name: Checkout database
        uses: actions/checkout@v4
        with:
          repository: GoHyperrr/database
          path: database
      - name: Fetch matching branch for database
        run: |
          cd database
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          if git fetch origin "$BRANCH_NAME":"$BRANCH_NAME" 2>/dev/null; then
            echo "Checking out matching branch: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            echo "Matching branch $BRANCH_NAME not found in GoHyperrr/database, staying on default branch."
          fi
        shell: bash

      - name: Checkout event-bus
        uses: actions/checkout@v4
        with:
          repository: GoHyperrr/event-bus
          path: event-bus
      - name: Fetch matching branch for event-bus
        run: |
          cd event-bus
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          if git fetch origin "$BRANCH_NAME":"$BRANCH_NAME" 2>/dev/null; then
            echo "Checking out matching branch: $BRANCH_NAME"
            git checkout "$BRANCH_NAME"
          else
            echo "Matching branch $BRANCH_NAME not found in GoHyperrr/event-bus, staying on default branch."
          fi
        shell: bash
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Workspace
        run: |
          echo "go 1.25.5" > go.work
          echo "use (" >> go.work
          echo "    ./auth" >> go.work
          echo "    ./commerce" >> go.work
          echo "    ./database" >> go.work
          echo "    ./event-bus" >> go.work
          echo "    ./file-storage" >> go.work
          echo "    ./hyperrr" >> go.work
          echo "    ./mdk" >> go.work
          echo ")" >> go.work

      - name: Generate Code
        run: cd hyperrr && go run build_ci.go

      - name: Go Vet
        run: cd hyperrr && go vet ./...

      - name: Go Test
        run: cd hyperrr && go test -v ./...

      - name: Go Build
        run: cd hyperrr && go build ./cmd/hyperrr
