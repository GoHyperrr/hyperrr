# gqlgen.yml
schema:
  - graph/*.graphqls
  - ../internal/**/*.graphqls
  - ../pkg/**/*.graphqls
  - ../commerce/**/*.graphqls
  - ../modules/**/*.graphqls
exec:
  filename: graph/generated.go
  package: graph
model:
  filename: graph/model/models_gen.go
  package: model
resolver:
  layout: follow-schema
  dir: graph
  package: graph
models:
  WorkflowLineage:
    fields:
      relatedLineages:
        resolver: true
      events:
        resolver: true
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time
