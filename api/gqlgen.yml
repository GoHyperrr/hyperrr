# gqlgen.yml
schema:
  - api/graph/*.graphqls
  - api/graph/schema_gen/**/*.graphqls
exec:
  filename: api/graph/generated.go
  package: graph
model:
  filename: api/graph/model/models_gen.go
  package: model
resolver:
  layout: follow-schema
  dir: api/graph
  package: graph
models:
  WorkflowLineage:
    fields:
      relatedLineages:
        resolver: true
      events:
        resolver: true
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time
skip_mod_tidy: true
