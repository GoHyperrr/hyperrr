# gqlgen.yml
schema:
  - api/graph/*.graphqls
  - api/graph/schema_gen/**/*.graphqls
exec:
  filename: api/graph/generated.go
  package: graph
model:
  filename: api/graph/model/models_gen.go
  package: model

autobind:
  - github.com/GoHyperrr/commerce/product
  - github.com/GoHyperrr/commerce/store
  - github.com/GoHyperrr/commerce/seo
  - github.com/GoHyperrr/commerce/taxonomy
  - github.com/GoHyperrr/commerce/order
  - github.com/GoHyperrr/commerce/cart
  - github.com/GoHyperrr/commerce/customer
  - github.com/GoHyperrr/commerce/payments
  - github.com/GoHyperrr/notification
  - github.com/GoHyperrr/auth/apikey
  - github.com/GoHyperrr/auth/emailpass
  - github.com/GoHyperrr/auth/jwt
  - github.com/GoHyperrr/mdk

models:
  WorkflowLineage:
    fields:
      relatedLineages:
        resolver: true
      events:
        resolver: true
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Time:
    model:
      - github.com/99designs/gqlgen/graphql.Time
skip_mod_tidy: true

